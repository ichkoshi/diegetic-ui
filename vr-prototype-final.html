<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<title>Diegetic UI — VR Судалгаа</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
  #overlay {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.78); color:#fff; padding:10px 20px;
    border-radius:10px; font:13px/1.5 sans-serif; text-align:center;
    z-index:999; pointer-events:none; max-width:400px;
  }
  #cond-btns {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; z-index:999;
  }
  #cond-btns button {
    background:rgba(255,255,255,.15); color:#fff;
    border:1px solid rgba(255,255,255,.4); padding:7px 16px;
    border-radius:6px; cursor:pointer; font-size:13px;
  }
  #cond-btns button.active { background:#534AB7; border-color:#AFA9EC; }
  #log {
    position:absolute; bottom:60px; right:14px; width:230px;
    background:rgba(0,0,0,.65); color:#aef; padding:10px;
    border-radius:8px; font:11px/1.5 monospace; z-index:999;
    max-height:130px; overflow-y:auto;
  }
  #timer-box {
    position:absolute; top:14px; right:16px;
    background:rgba(0,0,0,.6); color:#fff;
    padding:6px 14px; border-radius:8px;
    font:16px/1 monospace; z-index:999;
  }
</style>
</head>
<body style="margin:0;background:#000">

<div id="overlay">
  <span id="cond-name">Нөхцөл А — Non-diegetic HUD</span><br>
  <small id="task-info">Даалгавар: "Inventory" товчийг олоод дарна уу</small>
</div>
<div id="timer-box">⏱ <span id="timer">0.0</span>s</div>
<div id="log"><div style="color:#888;margin-bottom:3px">Үр дүн:</div><div id="entries"></div></div>
<div id="cond-btns">
  <button class="active" onclick="setCond('A')">A — HUD</button>
  <button onclick="setCond('B')">B — Diegetic</button>
</div>

<a-scene background="color: #12121e" vr-mode-ui="enabled: true">

  <!-- ═══════════════════════════════════════════════════
       CAMERA RIG — Quest controller дэмжлэгтэй
  ═══════════════════════════════════════════════════ -->
  <a-entity id="rig" position="0 0 1.8">

    <a-camera id="cam" look-controls wasd-controls="acceleration: 20">

      <!-- ── CONDITION A: HUD — камерт наалдсан ── -->
      <a-entity id="hud-a" visible="true">

        <!-- Статус мэдээлэл: зүүн дээр -->
        <a-entity position="-0.38 0.20 -0.55">
          <a-plane width="0.28" height="0.16"
                   material="shader:flat; color:#0a0a18; opacity:0.85"></a-plane>
          <a-text value="HP: 85/100" position="-0.08 0.045 0.005"
                  color="#4af" width="0.5" align="left" font="roboto"></a-text>
          <a-text value="Score: 420" position="-0.08 0.005 0.005"
                  color="#ff8" width="0.5" align="left" font="roboto"></a-text>
          <a-text value="Level: 3" position="-0.08 -0.035 0.005"
                  color="#8f8" width="0.5" align="left" font="roboto"></a-text>
        </a-entity>

        <!-- Цэс товчнууд: баруун тал -->
        <a-entity id="hud-menu" position="0.38 0.04 -0.55">
          <!-- Inventory -->
          <a-entity class="clickable hud-btn"
                    data-label="Inventory" data-cond="A"
                    position="0 0.10 0" onclick-handler>
            <a-plane width="0.22" height="0.065"
                     material="shader:flat; color:#534AB7; opacity:0.95"
                     class="btn-bg"></a-plane>
            <a-text value="Inventory" position="0 0 0.003"
                    color="#fff" width="0.52" align="center" font="roboto"></a-text>
          </a-entity>
          <!-- Map -->
          <a-entity class="clickable hud-btn"
                    data-label="Map" data-cond="A"
                    position="0 0 0" onclick-handler>
            <a-plane width="0.22" height="0.065"
                     material="shader:flat; color:#993C1D; opacity:0.95"
                     class="btn-bg"></a-plane>
            <a-text value="Map" position="0 0 0.003"
                    color="#fff" width="0.52" align="center" font="roboto"></a-text>
          </a-entity>
          <!-- Settings -->
          <a-entity class="clickable hud-btn"
                    data-label="Settings" data-cond="A"
                    position="0 -0.10 0" onclick-handler>
            <a-plane width="0.22" height="0.065"
                     material="shader:flat; color:#0F6E56; opacity:0.95"
                     class="btn-bg"></a-plane>
            <a-text value="Settings" position="0 0 0.003"
                    color="#fff" width="0.52" align="center" font="roboto"></a-text>
          </a-entity>
        </a-entity>

      </a-entity><!-- /hud-a -->

    </a-camera>

    <!-- ── Right controller with raycaster ── -->
    <a-entity id="right-hand"
              oculus-touch-controls="hand: right"
              raycaster="objects: .clickable; far: 12; lineColor: #AFA9EC; lineOpacity: 0.8"
              line="color: #AFA9EC; opacity: 0.7">
    </a-entity>

    <!-- ── Left controller ── -->
    <a-entity id="left-hand"
              oculus-touch-controls="hand: left">
    </a-entity>

  </a-entity><!-- /rig -->

  <!-- ═══════════════════════════════════════════════════
       ENVIRONMENT
  ═══════════════════════════════════════════════════ -->
  <!-- Floor -->
  <a-plane position="0 0 0" rotation="-90 0 0"
           width="20" height="20"
           material="color:#1a2a1a; roughness:0.9"></a-plane>

  <!-- Back wall -->
  <a-box position="0 2.5 -7" width="16" height="5" depth="0.2"
         material="color:#1e1e3a; roughness:0.8"></a-box>
  <!-- Side walls -->
  <a-box position="-7 2.5 -2" width="0.2" height="5" depth="12"
         material="color:#1a1a30"></a-box>
  <a-box position="7 2.5 -2" width="0.2" height="5" depth="12"
         material="color:#1a1a30"></a-box>

  <!-- Ambient objects for spatial reference -->
  <a-box position="-3 0.5 -5" width="0.8" height="0.8" depth="0.8"
         material="color:#2a3a5a"></a-box>
  <a-sphere position="3 0.6 -4.5" radius="0.4"
            material="color:#2a4a2a"></a-sphere>
  <a-cylinder position="0 0.75 -6" radius="0.35" height="1.5"
              material="color:#4a2a2a"></a-cylinder>

  <!-- Ceiling light -->
  <a-light type="point" position="0 4 -3" color="#8888ff" intensity="0.4"></a-light>
  <a-light type="ambient" color="#334" intensity="0.7"></a-light>
  <a-light type="directional" position="2 5 2" color="#fff" intensity="0.5"></a-light>

  <!-- ═══════════════════════════════════════════════════
       CONDITION A: 3D task instruction panel (world space)
  ═══════════════════════════════════════════════════ -->
  <a-entity id="task-panel-a" position="0 2.4 -3.5" visible="true">
    <a-plane width="2.2" height="0.5"
             material="shader:flat; color:#0a0a18; opacity:0.9"></a-plane>
    <a-text id="task-text-3d"
            value="Даалгавар: Баруун талын цэснээс\n'Inventory' товч дарна уу"
            position="0 0 0.01" color="#ffffffcc"
            width="3.5" align="center" font="roboto"></a-text>
  </a-entity>

  <!-- ═══════════════════════════════════════════════════
       CONDITION B: DIEGETIC — Ертөнцийн объект (table + smart device)
  ═══════════════════════════════════════════════════ -->
  <a-entity id="diegetic-b" visible="false">

    <!-- Table -->
    <a-box position="-2.2 0.45 -3.5" width="1.2" height="0.06" depth="0.8"
           material="color:#3a2a1a; roughness:0.7; metalness:0.1"></a-box>
    <!-- Table legs -->
    <a-cylinder position="-2.6 0.22 -3.2" radius="0.04" height="0.45"
                material="color:#2a1a0a"></a-cylinder>
    <a-cylinder position="-1.8 0.22 -3.2" radius="0.04" height="0.45"
                material="color:#2a1a0a"></a-cylinder>
    <a-cylinder position="-2.6 0.22 -3.8" radius="0.04" height="0.45"
                material="color:#2a1a0a"></a-cylinder>
    <a-cylinder position="-1.8 0.22 -3.8" radius="0.04" height="0.45"
                material="color:#2a1a0a"></a-cylinder>

    <!-- Device body on table -->
    <a-box position="-2.2 0.52 -3.5" width="0.55" height="0.04" depth="0.38"
           material="color:#111; roughness:0.2; metalness:0.8"></a-box>

    <!-- Device screen -->
    <a-plane id="device-screen" position="-2.2 0.545 -3.5"
             rotation="-90 0 0" width="0.48" height="0.30"
             material="shader:flat; color:#050510; opacity:1"></a-plane>

    <!-- Screen title -->
    <a-text value="MENU" position="-2.2 0.548 -3.34"
            rotation="-90 0 0" color="#AFA9EC"
            width="1.2" align="center" font="roboto"></a-text>

    <!-- Inventory button -->
    <a-entity class="clickable diegetic-btn"
              data-label="Inventory" data-cond="B"
              position="-2.2 0.548 -3.48" onclick-handler>
      <a-plane rotation="-90 0 0" width="0.40" height="0.07"
               material="shader:flat; color:#534AB7; opacity:0.95"
               class="btn-bg"></a-plane>
      <a-text value="Inventory" position="0 0.002 0"
              rotation="-90 0 0" color="#fff"
              width="1.0" align="center" font="roboto"></a-text>
    </a-entity>

    <!-- Map button -->
    <a-entity class="clickable diegetic-btn"
              data-label="Map" data-cond="B"
              position="-2.2 0.548 -3.57" onclick-handler>
      <a-plane rotation="-90 0 0" width="0.40" height="0.07"
               material="shader:flat; color:#3C3489; opacity:0.95"
               class="btn-bg"></a-plane>
      <a-text value="Map" position="0 0.002 0"
              rotation="-90 0 0" color="#fff"
              width="1.0" align="center" font="roboto"></a-text>
    </a-entity>

    <!-- Settings button -->
    <a-entity class="clickable diegetic-btn"
              data-label="Settings" data-cond="B"
              position="-2.2 0.548 -3.66" onclick-handler>
      <a-plane rotation="-90 0 0" width="0.40" height="0.07"
               material="shader:flat; color:#3C3489; opacity:0.95"
               class="btn-bg"></a-plane>
      <a-text value="Settings" position="0 0.002 0"
              rotation="-90 0 0" color="#fff"
              width="1.0" align="center" font="roboto"></a-text>
    </a-entity>

    <!-- Ambient glow under device -->
    <a-sphere position="-2.2 0.53 -3.5" radius="0.35"
              material="shader:flat; color:#534AB7; opacity:0.06"></a-sphere>

    <!-- Arrow pointing to device -->
    <a-entity position="-2.2 1.6 -3.5">
      <a-text value="Цэс энд байна" color="#ffcc44"
              width="2.5" align="center" font="roboto"></a-text>
    </a-entity>
    <a-cone position="-2.2 1.3 -3.5"
            rotation="180 0 0"
            radius-bottom="0.06" radius-top="0" height="0.2"
            material="shader:flat; color:#ffcc44; opacity:0.8"></a-cone>

    <!-- Task instruction panel for condition B -->
    <a-entity position="0 2.4 -3.5">
      <a-plane width="2.4" height="0.5"
               material="shader:flat; color:#0a0a18; opacity:0.9"></a-plane>
      <a-text value="Даалгавар: Зүүн талын ширээн дээрх\nтөхөөрөмжөөс 'Inventory' дарна уу"
              position="0 0 0.01" color="#ffffffcc"
              width="3.5" align="center" font="roboto"></a-text>
    </a-entity>

  </a-entity><!-- /diegetic-b -->

  <!-- ═══════════════════════════════════════════════════
       RESULT DISPLAY PANEL (shows in VR after task)
  ═══════════════════════════════════════════════════ -->
  <a-entity id="result-panel" position="0 1.8 -2.5" visible="false">
    <a-plane width="1.8" height="0.5"
             material="shader:flat; color:#0a1a0a; opacity:0.95"></a-plane>
    <a-text id="result-text" value=""
            position="0 0 0.01" color="#aaffaa"
            width="3.0" align="center" font="roboto"></a-text>
  </a-entity>

</a-scene>

<script>
// ─── State ────────────────────────────────────────────────────────────────
let cond = 'A';
let taskStart = null;
let timerInt = null;
let taskDone = false;
let trial = 0;
const MAX_TRIALS = 3;
const TARGET = 'Inventory';
const results = { A:[], B:[] };

const condMeta = {
  A: { name:'Нөхцөл А — Non-diegetic HUD', task:'Даалгавар: Баруун талын цэснээс "Inventory" дарна уу' },
  B: { name:'Нөхцөл В — Diegetic объект',  task:'Даалгавар: Зүүн талын ширээн дээрх төхөөрөмжөөс "Inventory" дарна уу' },
};

// ─── Timer ─────────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInt);
  taskStart = performance.now();
  taskDone = false;
  timerInt = setInterval(() => {
    if (!taskDone)
      document.getElementById('timer').textContent =
        ((performance.now()-taskStart)/1000).toFixed(1);
  }, 100);
}

function stopTimer() {
  clearInterval(timerInt);
  taskDone = true;
  return ((performance.now()-taskStart)/1000).toFixed(2);
}

// ─── Log ───────────────────────────────────────────────────────────────────
function addLog(html) {
  const d = document.createElement('div');
  d.style.marginBottom = '2px';
  d.innerHTML = html;
  document.getElementById('entries').prepend(d);
}

// ─── Result panel in VR ────────────────────────────────────────────────────
function showVRResult(msg, color='#aaffaa') {
  const panel = document.getElementById('result-panel');
  const txt   = document.getElementById('result-text');
  txt.setAttribute('value', msg);
  txt.setAttribute('color', color);
  panel.setAttribute('visible', true);
  setTimeout(() => panel.setAttribute('visible', false), 2500);
}

// ─── Handle button click ───────────────────────────────────────────────────
function handleClick(label, btnCond) {
  if (btnCond !== cond) return;
  const elapsed = stopTimer();
  const correct = label === TARGET;

  if (correct) {
    trial++;
    results[cond].push(parseFloat(elapsed));
    const avg = (results[cond].reduce((a,b)=>a+b,0)/results[cond].length).toFixed(2);
    addLog(`<span style="color:#aef">[${cond}] Tr${trial}: ${elapsed}s ✓  avg:${avg}s</span>`);
    showVRResult(`✓  ${elapsed}s — Зөв!  (${trial}/${MAX_TRIALS})`, '#aaffaa');

    if (trial >= MAX_TRIALS) {
      document.getElementById('task-info').textContent =
        `✓ Бүгд ${MAX_TRIALS} туршилт дуусав! Дундаж: ${avg}s`;
      showVRResult(`Нөхцөл ${cond} дууслаа!\nДундаж: ${avg}s`, '#ffffaa');
      clearInterval(timerInt);
    } else {
      setTimeout(startTimer, 800);
    }
  } else {
    addLog(`<span style="color:#f88">[${cond}] ${elapsed}s — "${label}" буруу ✗</span>`);
    showVRResult(`✗  "${label}" — буруу. Дахин оролдоно уу.`, '#ffaaaa');
    startTimer(); // continue timing
  }
}

// ─── Set condition ─────────────────────────────────────────────────────────
function setCond(c) {
  cond = c;
  trial = 0;
  taskDone = false;
  clearInterval(timerInt);
  document.getElementById('timer').textContent = '0.0';

  // Show/hide 3D elements
  document.getElementById('hud-a').setAttribute('visible', c==='A');
  document.getElementById('task-panel-a').setAttribute('visible', c==='A');
  document.getElementById('diegetic-b').setAttribute('visible', c==='B');

  // Update overlay
  document.getElementById('cond-name').textContent = condMeta[c].name;
  document.getElementById('task-info').textContent = condMeta[c].task;

  // Update buttons
  document.querySelectorAll('#cond-btns button').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().startsWith(c));
  });

  // Start timer
  setTimeout(startTimer, 400);
}

// ─── A-Frame: onclick-handler component ────────────────────────────────────
// Handles both gaze/cursor click AND Quest controller trigger
AFRAME.registerComponent('onclick-handler', {
  init() {
    const el = this.el;
    const label = el.getAttribute('data-label');
    const btnCond = el.getAttribute('data-cond');
    const bg = el.querySelector('.btn-bg');

    // Hover: lighten button
    el.addEventListener('mouseenter', () => {
      if (bg) bg.setAttribute('material', 'opacity', 0.6);
    });
    el.addEventListener('mouseleave', () => {
      if (bg) bg.setAttribute('material', 'opacity', 0.95);
    });

    // Click — works for cursor, gaze, and controller trigger
    el.addEventListener('click', () => {
      handleClick(label, btnCond);
    });

    // Quest controller trigger
    el.addEventListener('triggerdown', () => {
      handleClick(label, btnCond);
    });
  }
});

// ─── A-Frame: raycaster on right controller triggers clickable ──────────────
AFRAME.registerComponent('controller-click-fwd', {
  init() {
    const hand = this.el;
    hand.addEventListener('triggerdown', () => {
      const ray = hand.components.raycaster;
      if (!ray) return;
      const ints = ray.intersectedEls;
      if (ints.length > 0) {
        ints[0].emit('click');
      }
    });
  }
});

// ─── Attach controller-click-fwd after scene loads ─────────────────────────
document.querySelector('a-scene').addEventListener('loaded', () => {
  const rh = document.getElementById('right-hand');
  if (rh) rh.setAttribute('controller-click-fwd', '');

  // Desktop cursor fallback
  const cam = document.getElementById('cam');
  const cursor = document.createElement('a-cursor');
  cursor.setAttribute('color', '#ffffff');
  cursor.setAttribute('fuse', 'false');
  cursor.setAttribute('raycaster', 'objects: .clickable');
  cam.appendChild(cursor);

  // Start
  setCond('A');
});

// ─── Keyboard: 1=A, 2=B, R=reset current ──────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='1') setCond('A');
  if (e.key==='2') setCond('B');
  if (e.key==='r'||e.key==='R') setCond(cond);
});
</script>
</body>
</html>
